<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Delivery Challans — Veranjaneya Billing</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-layout">
        <div id="sidebar-mount"></div>
        <div class="main-content">
            <header class="top-header no-print">
                <div>
                    <div class="page-title">Delivery Challans</div>
                    <div class="page-subtitle">Track dispatched goods with DC numbers</div>
                </div>
                <div class="header-actions">
                    <div class="search-bar">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0" />
                        </svg>
                        <input type="text" id="search-input" placeholder="Search challans..." oninput="renderList()">
                    </div>
                    <button class="btn btn-primary" onclick="openForm()">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        New Challan
                    </button>
                </div>
            </header>
            <div class="page-body">
                <div class="card">
                    <div class="card-header"><span class="card-title">All Delivery Challans</span><span id="count"
                            style="font-size:12px;color:var(--text-muted)"></span></div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>DC No</th>
                                    <th>Invoice</th>
                                    <th>Customer</th>
                                    <th>Dispatch Date</th>
                                    <th>Vehicle No</th>
                                    <th>Driver</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="dc-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CREATE MODAL -->
    <div class="modal-overlay" id="form-modal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">New Delivery Challan</span>
                <button class="modal-close" onclick="closeModal('form-modal')"><svg fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <div class="form-group"><label>DC Number</label><input type="text" id="f-dcno" readonly
                            style="background:#f9fafb"></div>
                    <div class="form-group"><label>Date</label><input type="date" id="f-date"></div>
                    <div class="form-group"><label>Dispatch Date</label><input type="date" id="f-dispatch"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Link to Invoice</label>
                        <select id="f-invoice" onchange="onInvoiceChange()">
                            <option value="">-- Select Invoice (optional) --</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Customer</label>
                        <select id="f-customer">
                            <option value="">Select Customer</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Vehicle Number</label><input type="text" id="f-vehicle"
                            placeholder="KA 14 AB 1234" style="text-transform:uppercase"
                            oninput="this.value=this.value.toUpperCase()"></div>
                    <div class="form-group"><label>Driver Name</label><input type="text" id="f-driver"
                            placeholder="Driver name"></div>
                    <div class="form-group"><label>Driver Phone</label><input type="tel" id="f-driver-phone" placeholder="+91 ..."></div>
                    <div class="form-group"><label>Reference Number</label><input type="text" id="f-refno" placeholder="Reference No."></div>
                </div>

                <div
                    style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;margin-top:8px">
                    Items</div>
                <div class="items-section">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Description</th>
                                <th>Qty</th>
                                <th>Unit</th>
                                <th>Remarks</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="items-tbody"></tbody>
                    </table>
                </div>
                <button class="btn btn-outline btn-sm" onclick="addItem()" style="margin-bottom:14px">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>Add Item
                </button>

                <div class="form-group"><label>Notes / Delivery Instructions</label><input type="text" id="f-notes"
                        placeholder="Delivery instructions or notes"></div>
                <div class="form-group">
                    <label>Receiver's Signature</label>
                    <canvas id="sig-canvas" class="signature-pad" width="360" height="100"></canvas>
                    <div style="margin-top:5px;display:flex;gap:8px">
                        <button class="btn btn-ghost btn-sm" id="sig-clear">Clear Signature</button>
                        <span class="form-note">Draw signature above</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('form-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveChallan()">Save Challan</button>
            </div>
        </div>
    </div>

    <!-- VIEW MODAL -->
    <div class="modal-overlay modal-xl" id="view-modal">
        <div class="modal modal-xl">
            <div class="modal-header no-print">
                <span class="modal-title">Delivery Challan Preview</span>
                <div style="display:flex;gap:8px;margin-left:auto;align-items:center;">
                    <button class="btn btn-outline btn-sm" onclick="printChallan()">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                        </svg>Print / Save PDF
                    </button>
                    <button class="modal-close" onclick="closeModal('view-modal')"><svg fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg></button>
                </div>
            </div>
            <div class="modal-body" id="dc-preview"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/app.js?v=2.1"></script>
    <script>
        Auth.require();

        let items = [];
        let viewingDC = null;

        function openForm(editId = null) {
            items = [];
            const dc = editId ? DB.getChallan(editId) : null;
            document.getElementById('edit-id').value = editId || '';
            document.getElementById('modal-title').textContent = editId ? 'Edit Challan' : 'New Delivery Challan';
            document.getElementById('f-dcno').value = dc ? dc.challanNo : DB.nextChallanNo();
            document.getElementById('f-date').value = dc ? dc.date : today();
            document.getElementById('f-dispatch').value = dc ? dc.dispatchDate : today();
            document.getElementById('f-vehicle').value = dc ? dc.vehicleNo : '';
            document.getElementById('f-driver').value = dc ? dc.driverName : '';
            document.getElementById('f-driver-phone').value = dc ? dc.driverPhone : '';
            document.getElementById('f-refno').value = dc ? (dc.referenceNo || '') : '';
            document.getElementById('f-notes').value = dc ? dc.notes : '';

            const invSel = document.getElementById('f-invoice');
            invSel.innerHTML = '<option value="">-- No Invoice --</option>' +
                DB.getInvoices().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(i =>
                    `<option value="${i.id}" ${dc && dc.invoiceId === i.id ? 'selected' : ''}>${i.invoiceNo} - ${i.customerName} (${fmtCur(i.grandTotal)})</option>`
                ).join('');

            const custSel = document.getElementById('f-customer');
            custSel.innerHTML = '<option value="">Select Customer</option>' +
                DB.getCustomers().map(c => `<option value="${c.id}" ${dc && dc.customerId === c.id ? 'selected' : ''}>${c.name}</option>`).join('');

            if (dc) { items = dc.items ? JSON.parse(JSON.stringify(dc.items)) : []; }
            else { items = []; }
            if (items.length === 0) addItem();
            renderItems();
            openModal('form-modal');
            initSignaturePad('sig-canvas', 'sig-clear');
        }

        function onInvoiceChange() {
            const invId = document.getElementById('f-invoice').value;
            if (!invId) return;
            const inv = DB.getInvoice(invId);
            if (!inv) return;
            document.getElementById('f-customer').value = inv.customerId || '';
            items = (inv.items || []).map(it => ({ name: it.name, qty: it.qty, unit: it.unit || 'Nos', remarks: '' }));
            renderItems();
        }

        function addItem() { items.push({ name: '', qty: 1, unit: 'Nos', remarks: '' }); renderItems(); }
        function removeItem(i) { items.splice(i, 1); renderItems(); }

        function renderItems() {
            document.getElementById('items-tbody').innerHTML = items.map((it, i) => `
    <tr>
      <td>${i + 1}</td>
      <td><input type="text" value="${it.name || ''}" placeholder="Item description" oninput="items[${i}].name=this.value" style="width:100%;min-width:160px"></td>
      <td><input type="number" value="${it.qty || 1}" min="0.001" step="any" oninput="items[${i}].qty=+this.value" style="width:60px"></td>
      <td><select onchange="items[${i}].unit=this.value" style="width:60px">${['Nos', 'Kg', 'Mtr', 'Set', 'Pcs'].map(u => `<option ${it.unit === u ? 'selected' : ''}>${u}</option>`).join('')}</select></td>
      <td><input type="text" value="${it.remarks || ''}" placeholder="Remarks" oninput="items[${i}].remarks=this.value" style="width:120px"></td>
      <td><button onclick="removeItem(${i})" class="btn btn-ghost btn-sm" style="color:var(--error);padding:4px"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></td>
    </tr>`).join('');
        }

        async function saveChallan() {
            const canvas = document.getElementById('sig-canvas');
            const sigData = canvas ? canvas.toDataURL() : '';
            const custId = document.getElementById('f-customer').value;
            const cust = custId ? DB.getCustomer(custId) : null;
            const invId = document.getElementById('f-invoice').value;
            const inv = invId ? DB.getInvoice(invId) : null;

            const data = {
                challanNo: document.getElementById('f-dcno').value,
                date: document.getElementById('f-date').value,
                dispatchDate: document.getElementById('f-dispatch').value,
                invoiceId: invId, invoiceNo: inv ? inv.invoiceNo : '',
                customerId: custId, customerName: cust ? cust.name : '',
                customerAddress: cust ? [cust.address, cust.city, cust.state].filter(Boolean).join(', ') : '',
                vehicleNo: document.getElementById('f-vehicle').value,
                driverName: document.getElementById('f-driver').value,
                driverPhone: document.getElementById('f-driver-phone').value,
                referenceNo: document.getElementById('f-refno').value,
                items: items,
                notes: document.getElementById('f-notes').value,
                signature: sigData
            };

            const editId = document.getElementById('edit-id').value;
            if (editId) { await DB.updateChallan(editId, data); toast('Challan updated!'); }
            else { await DB.addChallan(data); toast('Challan created!'); }
            closeModal('form-modal'); renderList();
        }

        function renderList() {
            const search = (document.getElementById('search-input').value || '').toLowerCase();
            let list = DB.getChallans().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            if (search) list = list.filter(c => (c.challanNo || '').toLowerCase().includes(search) || (c.customerName || '').toLowerCase().includes(search));
            document.getElementById('count').textContent = `${list.length} challan${list.length !== 1 ? 's' : ''}`;
            const tbody = document.getElementById('dc-tbody');
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg><h3>No challans yet</h3><p>Create your first delivery challan</p><button class="btn btn-primary" onclick="openForm()">New Challan</button></div></td></tr>`;
                return;
            }
            tbody.innerHTML = list.map(dc => `
    <tr>
      <td><strong style="color:var(--accent)">${dc.challanNo}</strong></td>
      <td>${dc.invoiceNo ? `<span class="badge badge-info">${dc.invoiceNo}</span>` : '-'}</td>
      <td>${dc.customerName || '-'}</td>
      <td>${fmtDate(dc.dispatchDate)}</td>
      <td><strong>${dc.vehicleNo || '-'}</strong></td>
      <td>${dc.driverName || '-'}</td>
      <td>
        <div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm" title="View" onclick="viewDC('${dc.id}')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button>
          <button class="btn btn-ghost btn-sm" title="Edit" onclick="openForm('${dc.id}')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
          <button class="btn btn-ghost btn-sm" title="Delete" onclick="del('${dc.id}')" style="color:var(--error)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
        </div>
      </td>
    </tr>`).join('');
        }

        function del(id) { if (!confirm('Delete this challan?')) return; DB.deleteChallan(id); toast('Deleted', 'warning'); renderList(); }

        /* ───────────────────────────────────────────────
           BUILD CHALLAN HTML — matches invoice design
        ─────────────────────────────────────────────── */
        function buildChallanHTML(dc) {
            const s = DB.getSettings();
            const compName = s.name || 'Your Company Name';
            const addressParts = [];
            if (s.address) addressParts.push(s.address);
            if (s.city) addressParts.push(s.city);
            if (s.state) addressParts.push(s.state);
            const compAddress = addressParts.join(', ') || '';
            const compGSTIN = s.gstin || '';
            const compPhone = s.phone || '';
            const bankName = s.bankName || '';
            const bankAccount = s.bankAccount || '';
            const bankBranch = s.bankBranch || '';
            const bankIFSC = s.bankIFSC || '';

            // Logo or letter avatar
            let logoHTML = '';
            if (s.showLogo !== false && s.logo) {
                logoHTML = `<img src="${s.logo}" style="max-height:48px;max-width:140px;object-fit:contain;">`;
            } else {
                logoHTML = `<div style="width:32px;height:32px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#003366;font-size:14px;">${compName.charAt(0)}</div>`;
            }

            // Items rows
            const itemRows = (dc.items || []).map((it, i) => `
                <tr>
                    <td style="padding:7px 8px;text-align:center;font-size:9.5px;border:1px solid #94a3b8;font-weight:600;color:#1e293b;">${i + 1}</td>
                    <td style="padding:7px 8px;text-align:left;font-size:9.5px;border:1px solid #94a3b8;font-weight:700;color:#0f172a;text-transform:uppercase;">${it.name || ''}</td>
                    <td style="padding:7px 8px;text-align:center;font-size:9.5px;border:1px solid #94a3b8;font-weight:700;color:#0f172a;">${parseFloat(it.qty || 1).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 3 })}</td>
                    <td style="padding:7px 8px;text-align:center;font-size:9.5px;border:1px solid #94a3b8;color:#334155;">${it.unit || 'Nos'}</td>
                    <td style="padding:7px 8px;text-align:left;font-size:9.5px;border:1px solid #94a3b8;color:#475569;">${it.remarks || ''}</td>
                </tr>`).join('');

            return `
            <div id="dc-print-content" class="challan-container" style="font-family:'Outfit','Inter',sans-serif;width:794px;height:1115px;min-height:1115px;max-height:1115px;margin:0 auto;padding:0;background:white;color:#1e293b;box-sizing:border-box;line-height:1.2;position:relative;border-radius:4px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);border:1px solid #e2e8f0;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;">

                <!-- TOP BAR -->
                <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 40px;border-bottom:1px solid #e2e8f0;font-size:9px;font-weight:800;color:#475569;text-transform:uppercase;background:#f8fafc;font-family:'Outfit',sans-serif;height:26px;box-sizing:border-box;flex-shrink:0;">
                    <span>Delivery Challan</span>
                    <span style="color:#003366;font-weight:900;letter-spacing:0.5px;">NON-TAX DOCUMENT</span>
                    <span>DC Copy</span>
                </div>

                <!-- WAVE HEADER (same as invoice) -->
                <div style="position:relative;width:100%;height:125px;overflow:hidden;background:white;flex-shrink:0;">
                    <svg width="800" height="125" viewBox="0 0 800 125" preserveAspectRatio="none" style="position:absolute;top:0;left:0;width:100%;height:125px;z-index:1;">
                        <path d="M 0,0 L 0,120 C 160,120 320,50 480,50 C 620,50 710,95 800,95 L 800,0 Z" fill="#bae6fd"/>
                    </svg>
                    <svg width="800" height="125" viewBox="0 0 800 125" preserveAspectRatio="none" style="position:absolute;top:0;left:0;width:100%;height:125px;z-index:2;">
                        <path d="M 0,0 L 0,105 C 120,105 270,125 420,65 C 510,25 600,0 680,0 Z" fill="#003366"/>
                    </svg>
                    <div style="position:absolute;top:0;left:0;width:100%;height:125px;z-index:3;display:flex;justify-content:space-between;align-items:center;padding:0 40px;box-sizing:border-box;">
                        <div style="display:flex;align-items:center;gap:12px;color:white;">
                            ${logoHTML}
                            <div style="display:flex;flex-direction:column;text-align:left;max-width:420px;">
                                <span style="font-size:15px;font-weight:800;letter-spacing:-0.2px;line-height:1.1;margin-bottom:2px;">${compName}</span>
                                <span style="font-size:8.5px;opacity:0.95;line-height:1.3;font-weight:500;">${compAddress}</span>
                                <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:8.5px;opacity:0.95;margin-top:3px;font-weight:600;">
                                    ${compGSTIN ? `<span>GSTIN: <span style="font-family:monospace;">${compGSTIN}</span></span>` : ''}
                                    ${compPhone ? `<span>Ph: ${compPhone}</span>` : ''}
                                    ${s.email ? `<span>Email: ${s.email}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div style="font-size:24px;font-weight:900;color:#003366;margin-right:10px;font-family:'Outfit',sans-serif;letter-spacing:0.5px;line-height:1;">
                            DELIVERY<br><span style="font-size:18px;letter-spacing:2px;">CHALLAN</span>
                        </div>
                    </div>
                </div>

                <!-- DC NO & DATE ROW -->
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 40px;flex-shrink:0;font-size:11px;font-weight:800;color:#003366;font-family:'Outfit',sans-serif;">
                    <span>DC NO: ${dc.challanNo}</span>
                    <span>${dc.invoiceNo ? `Ref. Invoice: ${dc.invoiceNo}` : ''}</span>
                    <span>DATE: ${fmtDate(dc.date)}</span>
                </div>

                <!-- PARTIES & LOGISTICS GRID -->
                <div style="padding:0 40px;margin-bottom:10px;flex-shrink:0;">
                    <table style="width:100%;border-collapse:collapse;font-size:9.5px;border:1px solid #94a3b8;text-align:left;line-height:1.4;color:#1e293b;">
                        <tr>
                            <!-- DELIVER TO -->
                            <td style="width:40%;border:1px solid #94a3b8;padding:8px;vertical-align:top;">
                                <strong style="color:#475569;font-size:8.5px;display:block;margin-bottom:3px;font-family:'Outfit',sans-serif;">DELIVER TO:-</strong>
                                <div style="font-weight:800;font-size:11px;text-transform:uppercase;color:#0f172a;margin-bottom:2px;">${dc.customerName || '-'}</div>
                                <div style="font-size:9px;color:#475569;text-transform:uppercase;white-space:pre-line;">${dc.customerAddress || ''}</div>
                            </td>
                            <!-- DISPATCH & VEHICLE -->
                            <td style="width:32%;border:1px solid #94a3b8;padding:8px;vertical-align:top;">
                                <div style="margin-bottom:5px;">
                                    <strong style="color:#475569;font-size:8px;font-family:'Outfit',sans-serif;">DISPATCH DATE:-</strong><br>
                                    <span style="font-weight:700;color:#0f172a;">${fmtDate(dc.dispatchDate)}</span>
                                </div>
                                <div style="margin-bottom:5px;">
                                    <strong style="color:#475569;font-size:8px;font-family:'Outfit',sans-serif;">VEHICLE NO:-</strong><br>
                                    <span style="font-weight:700;color:#0f172a;text-transform:uppercase;">${dc.vehicleNo || '-'}</span>
                                </div>
                                <div>
                                    <strong style="color:#475569;font-size:8px;font-family:'Outfit',sans-serif;">REFERENCE NO:-</strong><br>
                                    <span style="font-weight:700;color:#0f172a;">${dc.referenceNo || '-'}</span>
                                </div>
                            </td>
                            <!-- DRIVER INFO -->
                            <td style="width:28%;border:1px solid #94a3b8;padding:8px;vertical-align:top;">
                                <div style="margin-bottom:5px;">
                                    <strong style="color:#475569;font-size:8px;font-family:'Outfit',sans-serif;">DRIVER NAME:-</strong><br>
                                    <span style="font-weight:700;color:#0f172a;">${dc.driverName || '-'}</span>
                                </div>
                                <div style="margin-bottom:5px;">
                                    <strong style="color:#475569;font-size:8px;font-family:'Outfit',sans-serif;">DRIVER PHONE:-</strong><br>
                                    <span style="font-weight:700;color:#0f172a;">${dc.driverPhone || '-'}</span>
                                </div>
                                <div>
                                    <strong style="color:#475569;font-size:8px;font-family:'Outfit',sans-serif;">INVOICE REF:-</strong><br>
                                    <span style="font-weight:700;color:#0f172a;">${dc.invoiceNo || '-'}</span>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>

                <!-- ITEMS TABLE (flex-grow) -->
                <div class="challan-body-section" style="padding:0 40px;flex:1 1 auto;overflow:hidden;">
                    <table class="challan-items-table" style="width:100%;table-layout:fixed;border-collapse:collapse;font-size:9pt;border:1px solid #94a3b8;">
                        <thead>
                            <tr style="background:#003366;color:white;font-weight:700;height:30px;font-family:'Outfit',sans-serif;">
                                <th style="padding:6px;text-align:center;width:45px;border:1px solid #94a3b8;font-size:9pt;">SL.NO.</th>
                                <th style="padding:6px;text-align:left;border:1px solid #94a3b8;font-size:9pt;">Description of Goods</th>
                                <th style="padding:6px;text-align:center;width:80px;border:1px solid #94a3b8;font-size:9pt;">Quantity</th>
                                <th style="padding:6px;text-align:center;width:60px;border:1px solid #94a3b8;font-size:9pt;">Unit</th>
                                <th style="padding:6px;text-align:left;width:140px;border:1px solid #94a3b8;font-size:9pt;">Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemRows}
                            <!-- Total items count row -->
                            <tr>
                                <td colspan="2" style="padding:8px;font-size:9px;border:1px solid #94a3b8;color:#475569;font-style:italic;">
                                    Total Items: <strong style="color:#003366;">${(dc.items || []).length}</strong>
                                    ${dc.notes ? `&nbsp;&nbsp;|&nbsp;&nbsp;<strong>Note:</strong> ${dc.notes}` : ''}
                                </td>
                                <td style="padding:8px;text-align:center;font-size:9.5px;border:1px solid #94a3b8;font-weight:800;color:#003366;">
                                    ${(dc.items || []).reduce((s, it) => s + (parseFloat(it.qty) || 0), 0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 3 })}
                                </td>
                                <td style="padding:8px;border:1px solid #94a3b8;"></td>
                                <td style="padding:8px;border:1px solid #94a3b8;font-size:8.5px;color:#475569;font-style:italic;">E &amp; O.E</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- FOOTER (pushed to bottom by flex) -->
                <div style="display:flex;flex-direction:column;flex-shrink:0;width:100%;margin-top:0;">

                    <!-- Bank details if available -->
                    ${s.showBank !== false && bankName ? `
                    <div style="padding:0 40px;margin-bottom:8px;display:flex;gap:15px;">
                        <div style="flex:1.5;background:#f8fafc;border:1.5px dashed #cbd5e1;border-radius:4px;padding:6px 12px;text-align:left;font-size:9px;line-height:1.4;">
                            <strong style="font-size:9.5px;color:#003366;display:block;border-bottom:1px dashed #cbd5e1;padding-bottom:2px;margin-bottom:3px;text-transform:uppercase;font-family:'Outfit',sans-serif;">Company Bank Details</strong>
                            <div style="display:grid;grid-template-columns:80px 1fr;gap:2px;">
                                <span style="color:#64748b;">Bank:</span><span style="font-weight:700;color:#334155;">${bankName}</span>
                                <span style="color:#64748b;">Account No:</span><span style="font-weight:700;color:#334155;">${bankAccount}</span>
                                <span style="color:#64748b;">Branch/IFSC:</span><span style="font-weight:700;color:#334155;">${bankBranch}${bankIFSC ? ' - ' + bankIFSC : ''}</span>
                            </div>
                        </div>
                        <div style="flex:1;"></div>
                    </div>` : ''}

                    <!-- Signature row + wave footer -->
                    <div style="display:flex;justify-content:space-between;align-items:flex-end;padding:0 0 0 40px;margin-top:4px;min-height:90px;">

                        <!-- Left: Terms / declaration -->
                        <div style="flex:1.2;text-align:left;padding-bottom:8px;font-size:8.5px;line-height:1.35;color:#475569;">
                            <strong style="font-size:9px;color:#1e293b;text-decoration:underline;display:block;margin-bottom:3px;text-transform:uppercase;font-family:'Outfit',sans-serif;">Declaration</strong>
                            <div style="font-weight:500;">
                                1. THIS DELIVERY CHALLAN IS NOT A TAX INVOICE.<br>
                                2. GOODS DISPATCHED AS PER ORDER.<br>
                                3. PLEASE VERIFY GOODS BEFORE ACCEPTING.<br>
                                4. SUBJECT TO ${(s.city || 'LOCAL').toUpperCase()} JURISDICTION.
                            </div>
                        </div>

                        <!-- Center: Receiver + Authorised sig blocks -->
                        <div style="flex:1.3;display:flex;gap:20px;justify-content:center;padding-bottom:8px;align-items:flex-end;">
                            <!-- Receiver signature -->
                            <div style="text-align:center;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:80px;color:#003366;">
                                <div style="height:40px;"></div>
                                <div style="border-top:1px solid #003366;width:130px;padding-top:4px;font-weight:800;font-size:8.5px;text-transform:uppercase;text-align:center;font-family:'Outfit',sans-serif;">
                                    Receiver's Signature
                                </div>
                                <div style="font-size:8px;color:#64748b;">(Name &amp; Date)</div>
                            </div>
                            <!-- Authorised signature -->
                            <div style="text-align:center;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:80px;color:#003366;">
                                <div style="font-weight:800;font-size:9px;text-transform:uppercase;margin-bottom:4px;font-family:'Outfit',sans-serif;">For ${compName}</div>
                                ${s.showSignature && s.signature ? `<img src="${s.signature}" style="max-height:30px;max-width:110px;display:block;margin-bottom:2px;">` : '<div style="height:30px;"></div>'}
                                <div style="border-top:1px solid #003366;width:140px;padding-top:4px;font-weight:800;font-size:8.5px;text-transform:uppercase;text-align:center;font-family:'Outfit',sans-serif;">
                                    Authorised Signatory
                                </div>
                            </div>
                        </div>

                        <!-- Right: Blue wave block (same as invoice) -->
                        <div style="position:relative;width:45%;height:90px;overflow:hidden;display:block;">
                            <svg width="400" height="100" viewBox="0 0 400 100" preserveAspectRatio="none" style="position:absolute;bottom:0;left:0;width:100%;height:90px;z-index:1;">
                                <path d="M 400,100 L 400,10 C 250,10 150,100 0,100 Z" fill="#bae6fd"/>
                            </svg>
                            <svg width="400" height="100" viewBox="0 0 400 100" preserveAspectRatio="none" style="position:absolute;bottom:0;left:0;width:100%;height:90px;z-index:2;">
                                <path d="M 400,100 L 400,0 C 250,0 150,100 0,100 Z" fill="#003366"/>
                            </svg>
                            <div style="position:absolute;bottom:0;right:0;width:100%;height:80px;z-index:3;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;color:white;padding:0 40px 0 130px;text-align:right;box-sizing:border-box;">
                                <div style="font-weight:800;font-family:'Outfit',sans-serif;font-size:11px;color:white;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;">Thank You!</div>
                                <div style="font-size:8px;font-weight:600;color:#bae6fd;letter-spacing:0.5px;text-transform:uppercase;">Quality &amp; Reliability Delivered</div>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom blue strip -->
                    <div style="background:#003366;height:8px;width:100%;border-radius:0 0 4px 4px;margin-top:2px;"></div>
                </div>
            </div>`;
        }

        function viewDC(id) {
            viewingDC = DB.getChallan(id);
            if (!viewingDC) return;
            document.getElementById('dc-preview').innerHTML = buildChallanHTML(viewingDC);
            openModal('view-modal');
        }

        /* ─── Dedicated print window (same approach as invoice) ─── */
        function printChallan() {
            if (!viewingDC) return;
            const el = document.getElementById('dc-print-content');
            if (!el) { alert('No challan loaded.'); return; }

            const html = el.outerHTML;
            const pw = window.open('', '_blank', 'width=900,height=1200,menubar=no,toolbar=no,location=no,status=no');
            if (!pw) { alert('Pop-up blocked! Please allow pop-ups for this site.'); return; }

            pw.document.open();
            pw.document.write(`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delivery Challan ${viewingDC.challanNo || ''}</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  @page { size: A4; margin: 10mm; }
  *, *::before, *::after {
    box-sizing: border-box;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  html, body { margin: 0; padding: 0; background: white; font-family: 'Outfit', sans-serif; }
  #dc-print-content {
    width: 190mm !important;
    height: 277mm !important;
    min-height: 277mm !important;
    max-height: 277mm !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: space-between !important;
    box-sizing: border-box !important;
    overflow: hidden !important;
    margin: 0 auto !important;
    box-shadow: none !important;
    border-radius: 0 !important;
    border: none !important;
    padding: 0 !important;
    background: white !important;
  }
  .challan-body-section {
    flex: 1 1 auto !important;
    overflow: hidden !important;
  }
  .challan-items-table {
    table-layout: fixed !important;
    width: 100% !important;
    font-size: 9pt !important;
    border-collapse: collapse !important;
  }
  .challan-items-table td, .challan-items-table th { font-size: 9pt !important; }
</style>
</head>
<body>
${html}
<script>
  document.fonts.ready.then(function() {
    window.print();
    window.addEventListener('afterprint', function() { window.close(); });
    setTimeout(function() { window.close(); }, 5000);
  });
<\/script>
</body>
</html>`);
            pw.document.close();
        }

        DB.init().then(() => {
            document.getElementById('sidebar-mount').innerHTML = sidebarHTML('challan.html');
            initSidebarUser();
            renderList();
        });
    </script>
</body>

</html>
